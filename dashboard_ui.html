<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TheSource – لوحة التحكم السيادية</title>
  <style>
    body {font-family: Arial, sans-serif; margin: 2rem; background:#f9f9f9;}
    .btn {background:#0066cc;color:#fff;padding:0.6rem 1.2rem;border:none;border-radius:4px;cursor:pointer;}
    .log {margin-top:1rem;background:#fff;padding:1rem;border:1px solid #ddd;max-height:300px;overflow:auto;}
  </style>
</head>
<body>
  <h1>لوحة التحكم السيادية – TheSource</h1>
  <button id="fullCoverageBtn" class="btn">🚀 تشغيل تغطية شاملة</button>
  <div id="log" class="log"></div>
  <script>
    const logEl=document.getElementById('log');
    document.getElementById('fullCoverageBtn').addEventListener('click',()=>{
      logEl.innerHTML+='🔄 تشغيل السرب الشامل...<br/>';
      fetch('/api/launch-full-coverage',{method:'POST'}).then(r=>r.json()).then(d=>{
        logEl.innerHTML+=`✅ ${d.message}<br/>`;
      }).catch(e=>logEl.innerHTML+=`❌ ${e}<br/>`);
    });
  </script>
</body>
</html>

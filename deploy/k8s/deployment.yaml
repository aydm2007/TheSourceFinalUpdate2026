apiVersion: apps/v1
kind: Deployment
metadata:
  name: thesource-mcp
  namespace: thesource
  labels:
    app.kubernetes.io/name: thesource-mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: thesource-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thesource-mcp
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3847"
    spec:
      containers:
        - name: mcp-server
          image: aether-zenith-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3847
          envFrom:
            - configMapRef:
                name: thesource-mcp-config
            - secretRef:
                name: thesource-mcp-secrets
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "const http=require('http');const key=process.env.MCP_API_KEY||process.env.MCP_ADMIN_API_KEY||'';const req=http.request({host:'127.0.0.1',port:process.env.PORT||3847,path:'/health',headers:{Authorization:'Bearer '+key}},res=>process.exit(res.statusCode<500?0:1));req.on('error',()=>process.exit(1));req.end();"
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "const http=require('http');const key=process.env.MCP_API_KEY||process.env.MCP_ADMIN_API_KEY||'';const req=http.request({host:'127.0.0.1',port:process.env.PORT||3847,path:'/health',headers:{Authorization:'Bearer '+key}},res=>process.exit(res.statusCode<500?0:1));req.on('error',()=>process.exit(1));req.end();"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

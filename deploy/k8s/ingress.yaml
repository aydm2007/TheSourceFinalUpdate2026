apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thesource-mcp
  namespace: thesource
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - thesource.example.com
      secretName: thesource-mcp-tls
  rules:
    - host: thesource.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: thesource-mcp
                port:
                  name: http

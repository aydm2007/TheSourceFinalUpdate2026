# CI/CD for Al‑Masdar (المصدر)
name: CI
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run MCP‑only tests (bridge)
        run: npm run test:bridge
      - name: Run full test suite
        run: npm test
      - name: Security scan (RealtimeScan)
        run: npm run security:scan
      - name: Generate visual audit report
        run: npx sovereign audit --name POST_CI_AUDIT
      - name: Upload artifact (audit report)
        uses: actions/upload-artifact@v3
        with:
          name: audit-report
          path: var/audit_reports/POST_CI_AUDIT.html

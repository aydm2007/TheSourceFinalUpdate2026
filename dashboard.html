<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sigma Dashboard</title>
<link rel="stylesheet" href="rtl.css">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
  body {font-family: Arial, Helvetica, sans-serif; direction: ltr; margin:0; padding:0; background:#f9f9f9;}
  #chat-container {max-width:620px; margin:30px auto; background:#fff; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.1); border-radius:8px;}
  #chat-messages {border:1px solid #ddd; height:320px; overflow-y:auto; padding:12px; border-radius:4px; background:#fff;}
  .chat-bubble {margin:6px 0; padding:8px 12px; border-radius:12px; max-width:80%; word-wrap:break-word;}
  .user {background:#e1f5fe; align-self:flex-end; text-align:right;}
  .bot {background:#e0e0e0; align-self:flex-start; text-align:left;}
  #input-row {display:flex; margin-top:12px;}
  #chat-input {flex:1; padding:8px; border:1px solid #ccc; border-radius:4px;}
  #send-btn, #audio-toggle {margin-left:8px; padding:8px 12px; border:none; background:#1976d2; color:#fff; border-radius:4px; cursor:pointer;}
  #audio-toggle {background:#4caf50;}
/* Spinner */
.loader{border:4px solid #f3f3f3;border-top:4px solid var(--primary);border-radius:50%;width:24px;height:24px;animation:spin 1s linear infinite;display:none;margin-left:8px;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="chat-container">
  <div id="chat-messages"></div>
  <div id="input-row">
    <input type="text" id="chat-input" placeholder="" />
    <button id="send-btn"></button><div class="loader" id="loader"></div>
    <button id="audio-toggle"></button>
  </div>
  <input type="file" id="chat-attachment" style="display:none;" />
</div>
<script>
// i18n configuration
const i18n = {
  en: {send:'Send',placeholder:'Type a message...',attach:'Attach',audioOn:'🔊',audioOff:'🔇',error:'Error contacting Sigma API',replyFallback:'No response'},
  ar: {send:'إرسال',placeholder:'اكتب رسالتك...',attach:'مرفق',audioOn:'🔊',audioOff:'🔇',error:'خطأ في التواصل مع خدمة Sigma',replyFallback:'لا يوجد رد'}
};
let currentLang='en';
let audioEnabled=true;
const chatMessages=document.getElementById('chat-messages');
const chatInput=document.getElementById('chat-input');
const sendBtn=document.getElementById('send-btn');
const audioToggle=document.getElementById('audio-toggle');
const attachmentInput=document.getElementById('chat-attachment');
function applyTranslations(){
  if(!sendBtn||!chatInput||!audioToggle) return;
  sendBtn.textContent=i18n[currentLang].send;
  chatInput.placeholder=i18n[currentLang].placeholder;
  audioToggle.textContent=audioEnabled?i18n[currentLang].audioOn:i18n[currentLang].audioOff;
}
function switchLanguage(lang){if(i18n[lang]){currentLang=lang;applyTranslations();}}
function addMessage(text,sender='user'){
  const bubble=document.createElement('div');
  bubble.className=`chat-bubble ${sender}`;
  bubble.textContent=text;
  chatMessages.appendChild(bubble);
  chatMessages.scrollTop=chatMessages.scrollHeight;
}
async function sendMessage(){
  const msg=chatInput.value.trim();
  if(!msg) return;
  addMessage(msg,'user');
  chatInput.value='';
  const formData=new FormData();
  formData.append('message',msg);
  if(attachmentInput.files.length) formData.append('attachment',attachmentInput.files[0]);
  try{
    const resp=await fetch('http://localhost:8001/mock-chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    const data=await resp.json();
    const reply=data.reply||i18n[currentLang].replyFallback;
    addMessage(reply,'bot');
    if(audioEnabled && data.audioUrl){
      const url=data.audioUrl;
      if(window.AudioContext||window.webkitAudioContext){
        const ctx=new (window.AudioContext||window.webkitAudioContext)();
        const buf=await fetch(url).then(r=>r.arrayBuffer());
        const buffer=await ctx.decodeAudioData(buf);
        const src=ctx.createBufferSource();
        src.buffer=buffer; src.connect(ctx.destination); src.start(0);
      } else { new Audio(url).play(); }
    }
    if(data.attachmentUrl){
      const a=document.createElement('a');
      a.href=data.attachmentUrl; a.textContent=i18n[currentLang].attach; a.target='_blank'; a.rel='noopener';
      chatMessages.appendChild(a);
    }
  }catch(e){
    console.error('Sigma API error:',e);
    addMessage(i18n[currentLang].error,'bot');
  }
}
function toggleAudio(){
  audioEnabled=!audioEnabled;
  audioToggle.textContent=audioEnabled?i18n[currentLang].audioOn:i18n[currentLang].audioOff;
}
applyTranslations();
// Add language selector UI
const langSelector = document.createElement('select');
langSelector.id = 'lang-selector';
langSelector.innerHTML = `<option value="en">English</option><option value="ar">العربية</option>`;
langSelector.addEventListener('change', (e) => switchLanguage(e.target.value));
document.body.insertBefore(langSelector, document.getElementById('chat-container'));

document.addEventListener('DOMContentLoaded',()=>{
  if(sendBtn) sendBtn.addEventListener('click',sendMessage);
  chatInput.addEventListener('keypress',e=>{if(e.key==='Enter') sendMessage();});
  if(audioToggle) audioToggle.addEventListener('click',toggleAudio);
});
</script>
</body>
</html>


---

apiVersion: v1
kind: ConfigMap
metadata:
  name: thesource-mcp-config
  namespace: thesource
data:
  NODE_ENV: "production"
  PORT: "3847"
  REDIS_URL: "redis://redis:6379"
  ALLOWED_ORIGINS: "https://thesource.example.com"
  AETHER_DEFAULT_SKILL: "mcp-developer"
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: thesource-mcp
  namespace: thesource
  labels:
    app.kubernetes.io/name: thesource-mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: thesource-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thesource-mcp
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3847"
    spec:
      containers:
        - name: mcp-server
          image: aether-zenith-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3847
          envFrom:
            - configMapRef:
                name: thesource-mcp-config
            - secretRef:
                name: thesource-mcp-secrets
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "const http=require('http');const key=process.env.MCP_API_KEY||process.env.MCP_ADMIN_API_KEY||'';const req=http.request({host:'127.0.0.1',port:process.env.PORT||3847,path:'/health',headers:{Authorization:'Bearer '+key}},res=>process.exit(res.statusCode<500?0:1));req.on('error',()=>process.exit(1));req.end();"
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "const http=require('http');const key=process.env.MCP_API_KEY||process.env.MCP_ADMIN_API_KEY||'';const req=http.request({host:'127.0.0.1',port:process.env.PORT||3847,path:'/health',headers:{Authorization:'Bearer '+key}},res=>process.exit(res.statusCode<500?0:1));req.on('error',()=>process.exit(1));req.end();"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thesource-mcp
  namespace: thesource
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - thesource.example.com
      secretName: thesource-mcp-tls
  rules:
    - host: thesource.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: thesource-mcp
                port:
                  name: http
---

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - configmap.yaml
  - secret.example.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - redis.yaml
---

apiVersion: v1
kind: Namespace
metadata:
  name: thesource
  labels:
    app.kubernetes.io/name: thesource
    app.kubernetes.io/part-of: sovereign-mcp-platform
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: thesource
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: thesource
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---

apiVersion: v1
kind: Secret
metadata:
  name: thesource-mcp-secrets
  namespace: thesource
type: Opaque
stringData:
  MCP_API_KEY: "replace-with-admin-mcp-key"
  MCP_ADMIN_API_KEY: "replace-with-admin-mcp-key"
  MCP_DEV_API_KEY: "replace-with-developer-mcp-key"
---

apiVersion: v1
kind: Service
metadata:
  name: thesource-mcp
  namespace: thesource
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: thesource-mcp
  ports:
    - name: http
      port: 3847
      targetPort: http
